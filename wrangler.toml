name = "smails-rs"
main = "build/worker/shim.mjs"
compatibility_date = "2026-06-29"

[build]
command = "cargo install -q worker-build --version 0.8.5 && cargo install -q wasm-bindgen-cli --version 0.2.126 --locked && WASM_BINDGEN_BIN=$HOME/.cargo/bin/wasm-bindgen worker-build --release"

[durable_objects]
bindings = [
  { name = "MAILBOX", class_name = "Mailbox" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Mailbox"]
