name = "smails-rs"
main = "crates/worker/build/worker/shim.mjs"
compatibility_date = "2026-06-29"

[build]
command = "cargo install -q \"worker-build@^0.8\" && worker-build --release crates/worker"

[durable_objects]
bindings = [
  { name = "MAILBOX", class_name = "Mailbox" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Mailbox"]
