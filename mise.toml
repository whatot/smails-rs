[tools]
opentofu = "1.11.6"
wrangler = "4.105.0"

[env]
RUSTC_WRAPPER = ""
WRANGLER_LOG_PATH = ".wrangler/logs"
WASM_BINDGEN_BIN = "wasm-bindgen"
WORKER_BUILD_VERSION = "0.8.5"
WASM_BINDGEN_CLI_VERSION = "0.2.126"

[tasks.setup]
description = "Install Worker build tools used by Wrangler"
run = '''
cargo install --locked worker-build --version "$WORKER_BUILD_VERSION"
cargo install --locked wasm-bindgen-cli --version "$WASM_BINDGEN_CLI_VERSION"
'''

[tasks.build]
description = "Build the Worker bundle through Wrangler"
run = "CI=1 wrangler deploy --dry-run"

[tasks.check]
description = "Check formatting, native crates, wasm-compatible crates, and clippy"
run = '''
cargo fmt --all --check
cargo check --workspace
cargo check -p smails-core -p smails-worker -p smails-frontend --target wasm32-unknown-unknown
cargo test --workspace
cargo clippy --workspace --all-targets -- -D warnings
cargo clippy -p smails-core -p smails-worker -p smails-frontend --target wasm32-unknown-unknown -- -D warnings
'''

[tasks.cli]
description = "Run the smails CLI; pass args after --"
run = "cargo run -p smails-cli --"

[tasks.mcp]
description = "Run the smails MCP stdio server"
run = "cargo run -p smails-mcp"

[tasks.dev]
description = "Run Wrangler dev from the workspace root"
run = "wrangler dev --ip 127.0.0.1 --port 8787"

[tasks.deploy]
description = "Deploy the Worker with Wrangler"
run = '''
set -eu
: "${WORKER_DOMAIN:?Set WORKER_DOMAIN=mail.example.com}"
: "${MAILBOX_DOMAINS:?Set MAILBOX_DOMAINS=example.com}"
wrangler deploy --keep-vars --var "MAILBOX_DOMAINS:$MAILBOX_DOMAINS" --domain "$WORKER_DOMAIN"
'''

[tasks.cf-init]
description = "Initialize Cloudflare OpenTofu state"
run = "tofu -chdir=infra/cloudflare init"

[tasks.cf-plan]
description = "Plan Cloudflare WAF rate limiting rules"
run = "tofu -chdir=infra/cloudflare plan -out=tfplan"

[tasks.cf-apply]
description = "Apply the last Cloudflare OpenTofu plan"
run = "tofu -chdir=infra/cloudflare apply tfplan"

[tasks.probe]
description = "Probe the local dev Worker on 127.0.0.1:8787"
run = '''
set -eu
address="probe-$(date +%s)"
token="$address.0123456789abcdef0123456789abcdef"
curl --noproxy '*' --fail-with-body -sS http://127.0.0.1:8787/health
curl --noproxy '*' --fail-with-body -sS -X POST http://127.0.0.1:8787/api/mailbox -H 'content-type: application/json' -d "{\"address\":\"$address\",\"token\":\"$token\"}"
curl --noproxy '*' --fail-with-body -sS http://127.0.0.1:8787/api/mailbox/messages -H "authorization: Bearer $token"
'''
